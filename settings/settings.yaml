sysAdmin: superAdmin
log:
  freq: day
  useUTC: false
sync:
  mode: full  # incremental (增量) or full (全量)
  incremental_time: "20:00"  # 增量同步的时间，格式：HH:MM
  start_date: "2019-01-01"  # 数据开始日期，格式：YYYY-MM-DD
  # 令牌桶限流配置
  rate_limit:
    enabled: true  # 是否启用令牌桶限流
    bucket_size: 1  # 桶的大小（同时最大并发请求数）
    refill_rate: 0.1  # 令牌发放速率（每秒发放的令牌数），0.2表示每5秒发放1个令牌
  # 请求配置
  request:
    max_retries: 3  # 最大重试次数
    retry_delay: 2  # 重试间隔（秒）
    page_delay: 3  # 翻页间隔（秒）
    timeout: 30  # 请求超时（秒）
